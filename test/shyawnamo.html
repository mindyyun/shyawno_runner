<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shyawn Runner</title>
    <style>
      * { padding: 0; margin: 0; box-sizing: border-box; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        height: 100vh;
        background: #1a1a1a;
        user-select: none;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        outline: none;
        -webkit-tap-highlight-color: rgba(255,255,255,0);
      }
      #game-wrapper { position: relative; display: inline-block; }
      canvas#game   { border: 0.1px solid grey; display: block; }

      #motion-canvas { display: none; }

      #cam-box {
        position: absolute;
        top: 10px; left: 10px;
        width: 160px; height: 120px;
        border-radius: 10px;
        overflow: hidden;
        border: 2px solid rgba(255,255,255,0.35);
        box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        background: #000;
        z-index: 10;
      }
      #cam-video {
        width: 100%; height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        opacity: 0.92;
      }
      #cam-box.clap-flash { border-color: #ffdd00; box-shadow: 0 0 20px 5px rgba(255,220,0,0.9); }

      #clap-status {
        position: absolute;
        top: 134px; left: 10px;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        color: rgba(255,255,255,0.85);
        background: rgba(0,0,0,0.65);
        padding: 3px 7px;
        border-radius: 5px;
        z-index: 10;
        pointer-events: none;
        white-space: nowrap;
      }

      #cam-overlay {
        position: absolute;
        top: 10px; left: 10px;
        width: 160px; height: 120px;
        border-radius: 10px;
        background: rgba(0,0,0,0.82);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        text-align: center;
        z-index: 11;
        padding: 8px;
        gap: 6px;
        border: 2px solid rgba(255,255,255,0.2);
      }
      #cam-overlay .spinner {
        width: 24px; height: 24px;
        border: 3px solid rgba(255,255,255,0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #cam-overlay.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <canvas id="game"></canvas>
      <canvas id="motion-canvas" width="80" height="60"></canvas>

      <div id="cam-box">
        <video id="cam-video" autoplay playsinline muted></video>
      </div>
      <div id="cam-overlay">
        <div class="spinner"></div>
        <span>Starting<br>camera…</span>
      </div>
      <div id="clap-status">👏 Clap to jump</div>
    </div>

    <script>
// =============================================================================
// IMAGE PATHS
// =============================================================================
const IMAGES = {
  still:       "still.png",
  shyawn:      "shyawn.png",
  shyawn_run2: "hammy.png",
  matt1:       "matt1.png",
  matt2:       "matt2.png",
  matt3:       "justin.png",
  ground:      "ground.png",
};

// =============================================================================
// GROUND
// =============================================================================
class Ground {
  constructor(ctx, width, height, speed, scaleRatio) {
    this.ctx = ctx; this.canvas = ctx.canvas;
    this.width = width; this.height = height;
    this.speed = speed; this.scaleRatio = scaleRatio;
    this.x = 0;
    this.y = this.canvas.height - this.height;
    this.groundImage = new Image();
    this.groundImage.src = IMAGES.ground;
  }
  update(gameSpeed, dt) {
    this.x -= gameSpeed * dt * this.speed * this.scaleRatio;
  }
  draw() {
    this.ctx.drawImage(this.groundImage, this.x,              this.y, this.width, this.height);
    this.ctx.drawImage(this.groundImage, this.x + this.width, this.y, this.width, this.height);
    if (this.x < -this.width) this.x = 0;
  }
  reset() { this.x = 0; }
}

// =============================================================================
// OBSTACLE
// =============================================================================
class Obstacle {
  constructor(ctx, x, y, width, height, image) {
    this.ctx = ctx; this.x = x; this.y = y;
    this.width = width; this.height = height; this.image = image;
  }
  update(speed, gameSpeed, dt, scaleRatio) {
    this.x -= speed * gameSpeed * dt * scaleRatio;
  }
  draw() { this.ctx.drawImage(this.image, this.x, this.y, this.width, this.height); }
  collideWith(sprite) {
    const adj = 1.4;
    return (
      sprite.x                      < this.x + this.width  / adj &&
      sprite.x + sprite.width / adj > this.x                     &&
      sprite.y                      < this.y + this.height / adj &&
      sprite.y + sprite.height / adj > this.y
    );
  }
}

// =============================================================================
// OBSTACLE CONTROLLER
// =============================================================================
class ObstacleController {
  INTERVAL_MIN = 1000; INTERVAL_MAX = 2500;
  obstacles = []; nextInterval = null;

  constructor(ctx, obstacleImages, scaleRatio, speed) {
    this.ctx = ctx; this.canvas = ctx.canvas;
    this.obstacleImages = obstacleImages;
    this.scaleRatio = scaleRatio; this.speed = speed;
    this.setNextInterval();
  }
  rand(min, max) { return Math.floor(Math.random() * (max - min + 1) + min); }
  setNextInterval() { this.nextInterval = this.rand(this.INTERVAL_MIN, this.INTERVAL_MAX); }
  spawn() {
    const cfg = this.obstacleImages[this.rand(0, this.obstacleImages.length - 1)];
    this.obstacles.push(new Obstacle(
      this.ctx, this.canvas.width * 1.5,
      this.canvas.height - cfg.height,
      cfg.width, cfg.height, cfg.image
    ));
  }
  update(gameSpeed, dt) {
    if (this.nextInterval <= 0) { this.spawn(); this.setNextInterval(); }
    this.nextInterval -= dt;
    this.obstacles.forEach(o => o.update(this.speed, gameSpeed, dt, this.scaleRatio));
    this.obstacles = this.obstacles.filter(o => o.x > -o.width);
  }
  draw()              { this.obstacles.forEach(o => o.draw()); }
  collideWith(sprite) { return this.obstacles.some(o => o.collideWith(sprite)); }
  reset()             { this.obstacles = []; }
}

// =============================================================================
// PLAYER  (fixed)
// =============================================================================
class Player {
  WALK_TIMER = 200;
  walkTimer  = 200;
  frameIndex = 0;
  runImages  = [];

  // --- jump state ---
  // Single source of truth: the player can only jump when isOnGround() is true.
  // We removed the old `jumping` + `falling` dual-flag system that allowed
  // edge cases where both could be false simultaneously mid-air.
  _airborne   = false;   // true the moment a jump begins, false only on landing
  _falling    = false;   // true once upward momentum is exhausted
  jumpPressed = false;   // held high while the jump input is active

  JUMP_SPEED = 0.9;
  GRAVITY    = 0.4;

  constructor(ctx, width, height, minJump, maxJump, scaleRatio) {
    this.ctx = ctx; this.canvas = ctx.canvas;
    this.width = width; this.height = height;
    this.minJump = minJump; this.maxJump = maxJump;
    this.scaleRatio = scaleRatio;

    this.x       = 10 * scaleRatio;
    this.y       = this.canvas.height - this.height - 1.5 * scaleRatio;
    this.groundY = this.y;  // cache landing Y; recalculated in reset() after resize

    this.stillImage  = null;
    this._lastJumpAt = 0;

    const r1 = new Image();
    r1.src = IMAGES.shyawn;

    const r2 = new Image();
    r2.onerror = () => {
      // BUG 1 FIX (partial): if hammy.png fails, slot 1 mirrors slot 0 so
      // draw() always has a valid image at both frame indices.
      const fallback = new Image();
      fallback.src = IMAGES.shyawn;
      this.runImages[1] = fallback;
    };
    r2.src = IMAGES.shyawn_run2;
    this.runImages = [r1, r2];

    const still = new Image();
    still.onload = () => { this.stillImage = still; };
    still.src = IMAGES.still;

    this.image = this.runImages[0];

    // Space: start jump on keydown, release jumpPressed on keyup.
    // BUG 2 FIX: the old code released jumpPressed via setTimeout(220ms) which
    // could fire while the player was still rising, truncating the jump.
    // Tying release to keyup lets the player control jump height naturally.
    this._kd = e => { if (e.code === "Space") { this.triggerJump(); } };
    this._ku = e => { if (e.code === "Space") { this.jumpPressed = false; } };
    window.addEventListener("keydown", this._kd);
    window.addEventListener("keyup",   this._ku);
  }

  // BUG 3 FIX: isOnGround() is the single authoritative guard for jump eligibility.
  // The old code checked `if (!this.jumping)` but `jumping` was cleared at the
  // bottom of the falling branch — before y fully settled — letting a second
  // clap/space slip in on the same frame and start a mid-air jump.
  isOnGround() {
    return !this._airborne && Math.abs(this.y - this.groundY) < 2;
  }

  triggerJump() {
    const now = performance.now();
    if (now - this._lastJumpAt < 150) return;  // debounce rapid inputs
    this._lastJumpAt = now;

    // BUG 3 FIX: only allow a jump when actually standing on the ground.
    if (!this.isOnGround()) return;

    this._airborne   = true;
    this._falling    = false;
    this.jumpPressed = true;
    // No setTimeout here (was Bug 2). jumpPressed is cleared on keyup / clap release.
  }

  // Called by ClapDetector when a clap ends, so jumpPressed doesn't stay
  // latched forever (mirrors keyup for the keyboard path).
  releaseJump() {
    this.jumpPressed = false;
  }

  update(gameSpeed, dt) {
    // --- animation frame ---
    if (!this._airborne) {
      // Walk cycle only while grounded.
      this.walkTimer -= dt;
      if (this.walkTimer <= 0) {
        this.frameIndex = this.frameIndex === 0 ? 1 : 0;
        this.walkTimer  = this.WALK_TIMER;
      }
      this.image = this.runImages[this.frameIndex];
    } else {
      // Use still/airborne sprite. BUG 1 FIX: fall back to run frame 0 if
      // still.png hasn't loaded yet, rather than leaving this.image stale.
      const stillOk = this.stillImage &&
                      this.stillImage.complete &&
                      this.stillImage.naturalWidth > 0;
      this.image = stillOk ? this.stillImage : this.runImages[0];
    }

    // --- physics ---
    if (this._airborne && !this._falling) {
      // Rising phase: keep going up while we haven't hit minJump OR while
      // the jump button is held and we haven't hit maxJump.
      const aboveMin = this.y <= this.canvas.height - this.minJump;
      const aboveMax = this.y <= this.canvas.height - this.maxJump;

      if (!aboveMin || (!aboveMax && this.jumpPressed)) {
        this.y -= this.JUMP_SPEED * dt * this.scaleRatio;
        // Clamp to canvas top.
        if (this.y < 0) { this.y = 0; this._falling = true; }
      } else {
        // Minimum height reached and button released (or max height reached).
        this._falling = true;
      }
    } else if (this._airborne && this._falling) {
      // Falling phase: apply gravity.
      this.y += this.GRAVITY * dt * this.scaleRatio;

      // BUG 1 FIX: use >= so an overshoot (large dt spike) still lands cleanly.
      // The old `this.y < this.groundY` guard could become false on overshoot,
      // skipping the landing branch and leaving the player stuck mid-air with
      // _airborne=true and the walk cycle never resuming — making them vanish.
      if (this.y >= this.groundY) {
        this.y        = this.groundY;  // snap to ground, no float
        this._airborne = false;
        this._falling  = false;
        this.frameIndex = 0;
        this.image      = this.runImages[0];
        this.walkTimer  = this.WALK_TIMER;
      }
    }
  }

  draw() {
    // BUG 1 FIX: robust image selection. Prefer this.image, then run frame 0,
    // then run frame 1. If all three are unloaded, skip the draw silently
    // rather than throwing — the player will reappear next frame once loaded.
    const ok  = img => img && img.complete && img.naturalWidth > 0;
    const img = ok(this.image)        ? this.image
              : ok(this.runImages[0]) ? this.runImages[0]
              : ok(this.runImages[1]) ? this.runImages[1]
              : null;
    if (img) this.ctx.drawImage(img, this.x, this.y, this.width, this.height);
  }
}
// =============================================================================
// SCORE
// =============================================================================
class Score {
  score  = 0;
  HS_KEY = "shyawnHighScore";

  constructor(ctx, scaleRatio) {
    this.ctx = ctx; this.canvas = ctx.canvas; this.scaleRatio = scaleRatio;
  }
  update(dt)  { this.score += dt * 0.01; }
  reset()     { this.score  = 0; }
  setHighScore() {
    const hs = Number(localStorage.getItem(this.HS_KEY));
    if (this.score > hs) localStorage.setItem(this.HS_KEY, Math.floor(this.score));
  }
  draw() {
    const hs     = Number(localStorage.getItem(this.HS_KEY));
    const fs     = 20 * this.scaleRatio;
    const y      = 20 * this.scaleRatio;
    const scoreX = this.canvas.width - 75  * this.scaleRatio;
    const hsX    = scoreX            - 125 * this.scaleRatio;
    this.ctx.font      = `${fs}px serif`;
    this.ctx.fillStyle = "#525250";
    this.ctx.fillText(Math.floor(this.score).toString().padStart(6, "0"), scoreX, y);
    this.ctx.fillText(`HI ${hs.toString().padStart(6, "0")}`, hsX, y);
  }
}

// =============================================================================
// CLAP DETECTOR
// =============================================================================
class ClapDetector {
  MOTION_THRESHOLD = 0.08;
  SPIKE_MULTIPLIER = 2.5;
  COOLDOWN_MS      = 600;
  SAMPLE_INTERVAL  = 50;
  HISTORY_LEN      = 6;

  constructor(videoEl, onClap) {
    this.video  = videoEl;
    this.onClap = onClap;

    this.motionCanvas = document.getElementById("motion-canvas");
    this.motionCtx    = this.motionCanvas.getContext("2d", { willReadFrequently: true });
    this.W = this.motionCanvas.width;
    this.H = this.motionCanvas.height;

    this.prevPixels    = null;
    this.motionHistory = [];
    this.lastClapAt    = 0;
    this.prevWasLow    = false;
    this.warmup        = true;

    this._start();
  }

  async _start() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: 320, height: 240 }
      });
      this.video.srcObject = stream;
      await this.video.play();

      document.getElementById("cam-overlay").classList.add("hidden");
      document.getElementById("clap-status").textContent = "👏 Clap to jump";

      setTimeout(() => { this.warmup = false; }, 1500);
      setInterval(() => this._sample(), this.SAMPLE_INTERVAL);

    } catch (err) {
      document.getElementById("cam-overlay").innerHTML =
        `<span style="color:#ff8080">Camera denied.<br>Use Space to jump.</span>`;
      document.getElementById("clap-status").textContent = "⌨️ Space to jump";
    }
  }

  _sample() {
    if (this.video.readyState < 2) return;

    this.motionCtx.drawImage(this.video, 0, 0, this.W, this.H);
    const data = this.motionCtx.getImageData(0, 0, this.W, this.H).data;

    if (!this.prevPixels) {
      this.prevPixels = data.slice();
      return;
    }

    let changed = 0;
    const total = this.W * this.H;
    for (let i = 0; i < data.length; i += 4) {
      const curBright  = (data[i] + data[i+1] + data[i+2]) / 3;
      const prevBright = (this.prevPixels[i] + this.prevPixels[i+1] + this.prevPixels[i+2]) / 3;
      if (Math.abs(curBright - prevBright) > 25) changed++;
    }
    this.prevPixels = data.slice();

    const motionLevel = changed / total;

    this.motionHistory.push(motionLevel);
    if (this.motionHistory.length > this.HISTORY_LEN) this.motionHistory.shift();
    const avg = this.motionHistory.reduce((a, b) => a + b, 0) / this.motionHistory.length;

    const now    = performance.now();
    const isHigh = motionLevel > this.MOTION_THRESHOLD &&
                   motionLevel > avg * this.SPIKE_MULTIPLIER;
    const isLow  = motionLevel < this.MOTION_THRESHOLD * 0.5;

    if (!this.warmup && isHigh && this.prevWasLow) {
      if (now - this.lastClapAt > this.COOLDOWN_MS) {
        this.lastClapAt = now;
        this.onClap();
        this._flash();
        this._status("👏 JUMP!");
      }
    }

    if (isLow)  this.prevWasLow = true;
    if (isHigh) this.prevWasLow = false;
  }

  _flash() {
    const box = document.getElementById("cam-box");
    box.classList.add("clap-flash");
    clearTimeout(this._ft);
    this._ft = setTimeout(() => box.classList.remove("clap-flash"), 250);
  }

  _status(msg) {
    document.getElementById("clap-status").textContent = msg;
    clearTimeout(this._st);
    this._st = setTimeout(() => {
      document.getElementById("clap-status").textContent = "👏 Clap to jump";
    }, 600);
  }
}

// =============================================================================
// GAME SETUP
// =============================================================================
const canvas = document.getElementById("game");
const ctx    = canvas.getContext("2d");

const GAME_WIDTH  = 800;
const GAME_HEIGHT = 300;
const PLAYER_W    = 100 / 1.5;
const PLAYER_H    = 130 / 1.5;
const MAX_JUMP    = GAME_HEIGHT;
const MIN_JUMP    = 275;
const GROUND_W    = 2400;
const GROUND_H    = 24;
const GND_SPEED   = 0.4;

const OBSTACLE_CONFIG = [
  { key: "matt1",  w: 120 / 1.5, h: 150 / 1.5 },
  { key: "matt2",  w: 130 / 1.5, h: 160 / 1.5 },
  { key: "matt3",  w: 120 / 1.5, h: 160 / 1.5 },
  { key: "justin", w:  80 / 1.5, h: 110 / 1.5 },
];

const SPEED_START     = 1;
const SPEED_INCREMENT = 0.00001;

let player, ground, obstacles, score;
let scaleRatio, prevTime = null;
let gameSpeed    = SPEED_START;
let gameOver     = false;
let waiting      = true;
let restartReady = false;
let resetLockout = false;

function getScaleRatio() {
  const sw = Math.min(window.innerWidth,  document.documentElement.clientWidth);
  const sh = Math.min(window.innerHeight, document.documentElement.clientHeight);
  return (sw / sh < GAME_WIDTH / GAME_HEIGHT) ? sw / GAME_WIDTH : sh / GAME_HEIGHT;
}

function createSprites() {
  scaleRatio    = getScaleRatio();
  canvas.width  = GAME_WIDTH  * scaleRatio;
  canvas.height = GAME_HEIGHT * scaleRatio;

  player = new Player(
    ctx,
    PLAYER_W * scaleRatio, PLAYER_H * scaleRatio,
    MIN_JUMP * scaleRatio, MAX_JUMP * scaleRatio,
    scaleRatio
  );
  ground = new Ground(ctx, GROUND_W * scaleRatio, GROUND_H * scaleRatio, GND_SPEED, scaleRatio);

  const obstacleImages = OBSTACLE_CONFIG.map(cfg => {
    const img = new Image(); img.src = IMAGES[cfg.key];
    return { image: img, width: cfg.w * scaleRatio, height: cfg.h * scaleRatio };
  });
  obstacles = new ObstacleController(ctx, obstacleImages, scaleRatio, GND_SPEED);
  score     = new Score(ctx, scaleRatio);
}

function reset() {
  restartReady = false;
  gameOver     = false;
  waiting      = false;
  ground.reset();
  obstacles.reset();
  score.reset();
  gameSpeed = SPEED_START;

  if (player && player._kd) {
    window.removeEventListener("keydown", player._kd);
  }

  player = new Player(
    ctx,
    PLAYER_W * scaleRatio, PLAYER_H * scaleRatio,
    MIN_JUMP * scaleRatio, MAX_JUMP * scaleRatio,
    scaleRatio
  );
}

function setupReset() {
  if (!restartReady) {
    restartReady = true;
    setTimeout(() => {
      window.addEventListener("keyup",      reset, { once: true });
      window.addEventListener("touchstart", reset, { once: true });
    }, 1000);
  }
}

function handleClap() {
  if (waiting || gameOver) {
    reset();
    resetLockout = true;
    setTimeout(() => { resetLockout = false; }, 600);
    return;
  }
  if (resetLockout) return;
  player.triggerJump();

  // BUG 2 FIX: release jumpPressed after a short delay for clap inputs,
  // since there's no "keyup" equivalent. 300ms is long enough to clear
  // the minJump threshold on a normal jump without cutting it short.
  setTimeout(() => player.releaseJump(), 300);
}

function reset() {
  restartReady = false;
  gameOver     = false;
  waiting      = false;
  ground.reset();
  obstacles.reset();
  score.reset();
  gameSpeed = SPEED_START;

  // Clean up both keydown AND keyup listeners from the old player instance.
  if (player) {
    if (player._kd) window.removeEventListener("keydown", player._kd);
    if (player._ku) window.removeEventListener("keyup",   player._ku);  // ← was missing
  }

  player = new Player(
    ctx,
    PLAYER_W * scaleRatio, PLAYER_H * scaleRatio,
    MIN_JUMP * scaleRatio, MAX_JUMP * scaleRatio,
    scaleRatio
  );
}

new ClapDetector(document.getElementById("cam-video"), handleClap);

// =============================================================================
// GAME LOOP
// =============================================================================
function gameLoop(now) {
  if (prevTime === null) { prevTime = now; requestAnimationFrame(gameLoop); return; }
  const dt = Math.min(now - prevTime, 50);
  prevTime  = now;

  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!gameOver && !waiting) {
    ground.update(gameSpeed, dt);
    obstacles.update(gameSpeed, dt);
    player.update(gameSpeed, dt);
    score.update(dt);
    gameSpeed += dt * SPEED_INCREMENT;

    if (obstacles.collideWith(player)) {
      gameOver = true;
      score.setHighScore();
      setupReset();
    }
  }

  ground.draw();
  obstacles.draw();
  player.draw();
  score.draw();

  if (gameOver) {
    ctx.font      = `${70 * scaleRatio}px Verdana`;
    ctx.fillStyle = "grey";
    ctx.fillText("GAME OVER", canvas.width / 4.5, canvas.height / 2);
    ctx.font      = `${22 * scaleRatio}px Verdana`;
    ctx.fillText("👏 Clap or Space to restart", canvas.width / 4, canvas.height / 1.4);
  }

  if (waiting) {
    ctx.font      = `${30 * scaleRatio}px Verdana`;
    ctx.fillStyle = "grey";
    ctx.fillText("👏 Clap or Press Space To Start", canvas.width / 9, canvas.height / 2);
  }

  requestAnimationFrame(gameLoop);
}

createSprites();
window.addEventListener("resize", () => setTimeout(createSprites, 500));
if (screen.orientation) screen.orientation.addEventListener("change", createSprites);

requestAnimationFrame(gameLoop);
window.addEventListener("keyup", reset, { once: true });
    </script>
  </body>
</html>
